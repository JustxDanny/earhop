; -----------------------------------------------------------------------------
; Configuration. Run setup.ps1 to fill these in interactively, or edit by hand.
; All values come from SoundVolumeView's "Command-Line Friendly ID" column.
; Run `bin\SoundVolumeView.exe /stab dump.tsv` and inspect to discover IDs.
; -----------------------------------------------------------------------------

[devices]
; primary_match: a substring/prefix of your BT device's audio endpoint ID that
; uniquely identifies it. The middle "Device Name" component changes after
; A2DP DISABLE/ENABLE cycles, so prefix-match on the Friendly Name + "\Device\"
; portion. Example for Sony WH-1000XM4: "WH-1000XM4 Stereo\Device\"
primary_match =

; primary_mac: device MAC, no separators. Run setup.ps1 to autofill.
; Example: "AABBCCDDEEFF"
primary_mac   =

; primary_label: friendly name used in tray notifications.
; Example: "XM4"
primary_label = BT Headphones

; fallback1: full Command-Line Friendly ID of preferred fallback device.
; Used when toggling AWAY from the BT device, only if it's currently present.
; Example: "Realtek\Device\Speakers\Render"
fallback1     =

; fallback2: full Command-Line Friendly ID of secondary fallback (almost
; always present - your built-in speakers). Used when fallback1 is offline.
fallback2     =

[ui]
; 1 = tray toast on toggle, 0 = silent
toast = 1

; AHK v2 hotkey definition. Default is a 3-key chord: hold Ctrl, then
; Space+S. The "~Space & s" custom combo uses Space as a prefix key, the
; "~" keeps normal spacebar typing working, and hotkey_guard = "Control"
; means the chord only fires when Ctrl is also held.
;
; Examples:
;   hotkey = ~Space & s   hotkey_guard = Control   ;; Ctrl+Space+S (default)
;   hotkey = ^!s          hotkey_guard =           ;; Ctrl+Alt+S
;   hotkey = #F1          hotkey_guard =           ;; Win+F1
;   hotkey = ScrollLock   hotkey_guard =           ;; ScrollLock alone
hotkey       = ~Space & s
hotkey_guard = Control
